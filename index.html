<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>생활지도 누가기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #F2F1EE;
  --sur:     #FFFFFF;
  --sur2:    #F8F7F5;
  --sur3:    #EEECEA;
  --bd:      #E8E5DF;
  --bd2:     #D4D0C8;
  --tx:      #18181B;
  --tx2:     #6B6868;
  --tx3:     #A8A5A0;
  --blue:    #2563EB;
  --blue-l:  #EFF6FF;
  --blue-m:  #BFDBFE;
  --red:     #DC2626;
  --red-l:   #FEF2F2;
  --r:       10px;
  --rl:      16px;
  --rxl:     22px;
  --sh:      0 1px 3px rgba(0,0,0,0.07), 0 4px 14px rgba(0,0,0,0.06);
  --sh-lg:   0 8px 40px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.06);
  --tab-h:   60px;
  --safe-b:  env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--tx);
  min-height: 100dvh;
  overscroll-behavior: none;
}

/* ══ MOBILE SHELL ══ */
.shell {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}

/* ── TOP HEADER ── */
.hdr {
  background: var(--sur);
  border-bottom: 1px solid var(--bd);
  padding: 0 16px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 50;
  flex-shrink: 0;
}
.hdr-icon {
  width: 32px; height: 32px;
  background: var(--blue);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.hdr-title {
  font-size: 16px; font-weight: 700;
  color: var(--tx); letter-spacing: -0.02em;
}
.hdr-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.search-btn {
  width: 38px; height: 38px;
  border: 1px solid var(--bd2);
  border-radius: var(--r);
  background: var(--sur2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* Search overlay */
.search-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  align-items: flex-start;
  padding-top: 60px;
}
.search-overlay.open { display: flex; justify-content: center; }
.search-box {
  background: var(--sur);
  border-radius: var(--rl);
  padding: 14px 16px;
  width: calc(100% - 32px);
  max-width: 480px;
  box-shadow: var(--sh-lg);
}
.search-input-wrap { position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; }
.search-inp {
  width: 100%; padding: 12px 12px 12px 38px;
  border: 1.5px solid var(--bd2);
  border-radius: var(--r);
  background: var(--sur2);
  font-size: 15px; font-family: inherit;
  color: var(--tx); outline: none;
}
.search-inp:focus { border-color: var(--blue); background: var(--sur); }
.search-results { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; max-height: 55vh; overflow-y: auto; }
.search-result-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--sur2);
  border-radius: var(--r);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.search-result-item:active { background: var(--sur3); }
.sr-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--blue-l); color: var(--blue);
  font-size: 14px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sr-name { font-size: 14px; font-weight: 700; color: var(--tx); }
.sr-info { font-size: 12px; color: var(--tx3); margin-top: 1px; }
.sr-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.sr-tag { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }

/* ── BAN CHIPS ── */
.ban-scroll-wrap {
  background: var(--sur);
  border-bottom: 1px solid var(--bd);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  flex-shrink: 0;
}
.ban-scroll-wrap::-webkit-scrollbar { display: none; }
.ban-chips {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  width: max-content;
}
.ban-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border: 1.5px solid var(--bd);
  border-radius: 99px;
  background: var(--sur);
  font-size: 13px; font-weight: 600; font-family: inherit;
  color: var(--tx2); cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.ban-chip.active {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.ban-chip-cnt {
  font-size: 10px; font-weight: 700;
  background: rgba(255,255,255,0.28);
  padding: 1px 6px; border-radius: 99px;
  min-width: 18px; text-align: center;
}
.ban-chip:not(.active) .ban-chip-cnt {
  background: var(--sur3);
  color: var(--tx3);
}

/* ── PAGE AREA ── */
.pages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.page { display: none; padding: 16px 16px calc(var(--tab-h) + var(--safe-b) + 20px); }
.page.active { display: block; }

/* ── STAT STRIP ── */
.stat-strip {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.scard {
  background: var(--sur);
  border: 1px solid var(--bd);
  border-radius: var(--rl);
  padding: 14px 15px;
}
.scard.hi { background: var(--blue-l); border-color: var(--blue-m); }
.scard-lbl { font-size: 11px; color: var(--tx3); font-weight: 500; margin-bottom: 4px; }
.scard-val { font-size: 26px; font-weight: 700; color: var(--tx); letter-spacing: -0.03em; line-height: 1; }
.scard.hi .scard-val { color: var(--blue); }
.scard-unit { font-size: 11px; color: var(--tx3); margin-top: 3px; }

/* ── STUDENT GRID ── */
.stu-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.stu-card {
  background: var(--sur);
  border: 1.5px solid var(--bd);
  border-radius: var(--rl);
  padding: 12px 11px 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.12s;
  min-height: 72px;
}
.stu-card:active { background: var(--sur2); }
.stu-card.f-disc { border-color: #FDBA74; background: #FFFBF7; }
.stu-card.f-att  { border-color: #93C5FD; background: #F8FBFF; }
.stu-card.f-both { border-color: #F87171; background: #FFF8F8; }
.stu-num  { font-size: 10px; color: var(--tx3); margin-bottom: 4px; }
.stu-name { font-size: 13px; font-weight: 700; color: var(--tx); letter-spacing: -0.01em; line-height: 1.3; }
.stu-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
.mini-tag { font-size: 10px; font-weight: 600; padding: 2px 5px; border-radius: 4px; }

/* ── BOTTOM TAB BAR ── */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: var(--sur);
  border-top: 1px solid var(--bd);
  display: flex;
  z-index: 50;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  border: none; background: none; cursor: pointer;
  color: var(--tx3); font-size: 10px; font-weight: 600;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.12s;
}
.tab-btn.active { color: var(--blue); }
.tab-icon { font-size: 22px; line-height: 1; }

/* ── BOTTOM SHEET MODAL ── */
.sheet-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(4px);
  z-index: 100;
}
.sheet-bg.open { display: block; }
.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 101;
  background: var(--sur);
  border-radius: 22px 22px 0 0;
  max-height: 92dvh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.32,.72,0,1);
  padding-bottom: var(--safe-b);
  pointer-events: none;
}
.sheet.open { transform: translateY(0); pointer-events: auto; }

.sheet-handle {
  flex-shrink: 0;
  display: flex; justify-content: center;
  padding: 12px 0 6px;
}
.sheet-handle-bar {
  width: 36px; height: 4px;
  background: var(--bd2);
  border-radius: 99px;
}
.sheet-hdr {
  flex-shrink: 0;
  padding: 4px 18px 0;
}
.sheet-hero { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.sheet-avatar {
  width: 44px; height: 44px;
  border-radius: 13px;
  background: linear-gradient(135deg, #3B82F6, #1D4ED8);
  color: #fff; font-size: 17px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(37,99,235,0.3);
}
.sheet-name { font-size: 19px; font-weight: 700; color: var(--tx); letter-spacing: -0.02em; }
.sheet-sub  { font-size: 12px; color: var(--tx3); margin-top: 2px; }
.sheet-close {
  margin-left: auto;
  width: 32px; height: 32px;
  border: 1px solid var(--bd2);
  border-radius: 50%;
  background: var(--sur2);
  font-size: 14px; color: var(--tx2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.sheet-tabs {
  display: flex;
  border-bottom: 1px solid var(--bd);
}
.sheet-tab {
  flex: 1; padding: 11px 0;
  font-size: 13px; font-weight: 600; font-family: inherit;
  color: var(--tx3); border: none; background: none; cursor: pointer;
  border-bottom: 2.5px solid transparent;
  margin-bottom: -1px;
  -webkit-tap-highlight-color: transparent;
}
.sheet-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

.sheet-body {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 18px 18px 24px;
}

/* ── LOG ITEMS ── */
.log-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.log-item {
  border: 1px solid var(--bd);
  border-radius: var(--r);
  padding: 13px 14px;
  background: var(--sur2);
}
.log-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 7px; }
.log-date { font-size: 11px; color: var(--tx3); font-weight: 500; }
.log-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px; }
.log-text { font-size: 13px; color: var(--tx); line-height: 1.65; }
.log-acts { display: flex; gap: 6px; margin-top: 10px; }
.btn-xs {
  font-size: 12px; font-weight: 600; font-family: inherit;
  padding: 6px 12px;
  border: 1px solid var(--bd2);
  border-radius: 7px; cursor: pointer;
  background: var(--sur); color: var(--tx2);
  -webkit-tap-highlight-color: transparent;
}
.btn-xs:active { background: var(--sur3); }
.btn-xs.del { border-color: #FECACA; color: var(--red); }
.btn-xs.del:active { background: var(--red-l); }

/* ── FORM ── */
.form-sep  { height: 1px; background: var(--bd); margin: 18px 0; }
.form-head { font-size: 14px; font-weight: 700; color: var(--tx); margin-bottom: 14px; }
.form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-row  { margin-bottom: 10px; }
.form-lbl  {
  display: block; font-size: 11px; font-weight: 700;
  color: var(--tx3); text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 5px;
}
input[type=date], select, textarea {
  width: 100%; padding: 11px 12px;
  border: 1.5px solid var(--bd2);
  border-radius: var(--r);
  background: var(--sur);
  font-size: 15px; font-family: inherit; color: var(--tx);
  outline: none; appearance: none;
  transition: border-color 0.15s;
}
input[type=date]:focus, select:focus, textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.form-btns { display: flex; gap: 8px; margin-top: 16px; }

.btn-primary {
  flex: 1; padding: 13px 20px;
  background: var(--blue); color: #fff;
  border: none; border-radius: var(--r);
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; letter-spacing: -0.01em;
  box-shadow: 0 2px 6px rgba(37,99,235,0.3);
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:active { opacity: 0.85; }
.btn-ghost {
  padding: 13px 16px;
  background: none; color: var(--tx2);
  border: 1.5px solid var(--bd2);
  border-radius: var(--r);
  font-size: 15px; font-family: inherit; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* ── ATTENDANCE PILLS ── */
.att-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
.att-pill {
  font-size: 12px; font-weight: 700;
  padding: 6px 14px; border-radius: 99px;
  border: 1.5px solid transparent;
}

/* ── EMPTY ── */
.empty { text-align: center; padding: 36px 16px; color: var(--tx3); font-size: 13px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.45; }

/* ── STATS ── */
.stats-sec { margin-bottom: 32px; }
.stats-title {
  font-size: 13px; font-weight: 700;
  color: var(--tx); letter-spacing: -0.01em;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--bd);
}
.att-cards {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 18px;
}
.att-card {
  border-radius: var(--rl); padding: 14px 14px;
  border: 1.5px solid transparent;
}
.att-card .ac-tag  { font-size: 11px; font-weight: 700; margin-bottom: 8px; }
.att-card .ac-num  { font-size: 24px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; margin-bottom: 3px; }
.att-card .ac-sub  { font-size: 11px; opacity: 0.75; font-weight: 500; }

.chart-row { display: flex; flex-direction: column; gap: 9px; }
.chart-item { display: flex; align-items: center; gap: 10px; }
.chart-lbl { font-size: 11px; color: var(--tx2); width: 80px; flex-shrink: 0; text-align: right; line-height: 1.3; }
.chart-track { flex: 1; height: 20px; background: var(--sur3); border-radius: 5px; overflow: hidden; }
.chart-fill  { height: 100%; border-radius: 5px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.chart-n { font-size: 12px; color: var(--tx3); width: 24px; flex-shrink: 0; font-weight: 700; }

.rtable-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -16px; padding: 0 16px; }
.rtable { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 420px; }
.rtable th {
  padding: 8px 10px; background: var(--sur2);
  color: var(--tx3); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
  text-align: left;
}
.rtable td { padding: 9px 10px; border-bottom: 1px solid var(--bd); color: var(--tx); }
.rtable tr:last-child td { border-bottom: none; }
.rtable tr:hover td { background: var(--sur2); }

/* ── DESKTOP OVERRIDE ── */
@media (min-width: 768px) {
  .shell { flex-direction: row; }
  .hdr { display: none; }
  .ban-scroll-wrap { display: none; }

  /* sidebar */
  .sidebar-desk {
    width: 240px; flex-shrink: 0;
    background: var(--sur);
    border-right: 1px solid var(--bd);
    height: 100dvh; position: sticky; top: 0;
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .sd-brand {
    padding: 22px 18px 16px;
    border-bottom: 1px solid var(--bd);
  }
  .sd-brand-row { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
  .sd-icon {
    width: 30px; height: 30px; border-radius: 7px;
    background: var(--blue);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .sd-name { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .sd-sub  { font-size: 11px; color: var(--tx3); padding-left: 40px; }

  .sd-section { padding: 12px 10px 6px; }
  .sd-lbl {
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--tx3);
    padding: 0 8px; margin-bottom: 5px;
  }
  .sd-nav-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 9px 10px;
    border: none; background: none; border-radius: var(--r);
    cursor: pointer; font-size: 13px; font-family: inherit;
    color: var(--tx2); text-align: left;
    transition: background 0.1s, color 0.1s;
  }
  .sd-nav-btn:hover { background: var(--sur2); color: var(--tx); }
  .sd-nav-btn.active { background: var(--blue-l); color: var(--blue); font-weight: 700; }
  .sd-nav-icon { font-size: 15px; width: 18px; text-align: center; }
  .sd-ban-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 8px 10px;
    border: none; background: none; border-radius: var(--r);
    cursor: pointer; font-size: 13px; font-family: inherit;
    color: var(--tx2); text-align: left;
    transition: background 0.1s, color 0.1s;
  }
  .sd-ban-btn:hover { background: var(--sur2); color: var(--tx); }
  .sd-ban-btn.active { background: var(--blue-l); color: var(--blue); font-weight: 700; }
  .sd-dot {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--sur3); color: var(--tx3);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.1s, color 0.1s;
  }
  .sd-ban-btn.active .sd-dot { background: var(--blue); color: #fff; }
  .sd-cnt {
    margin-left: auto; font-size: 10px; font-weight: 700;
    padding: 1px 7px; border-radius: 99px;
    background: var(--sur3); color: var(--tx3);
  }
  .sd-ban-btn.active .sd-cnt { background: var(--blue); color: #fff; }

  /* desktop main */
  .desk-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .desk-topbar {
    background: var(--sur); border-bottom: 1px solid var(--bd);
    padding: 14px 26px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  .desk-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .desk-sub {
    font-size: 12px; color: var(--tx3); background: var(--sur3);
    padding: 2px 9px; border-radius: 99px;
  }
  .desk-search {
    margin-left: auto; position: relative;
  }
  .desk-search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--tx3); }
  .desk-search-inp {
    width: 210px; padding: 8px 12px 8px 32px;
    border: 1px solid var(--bd2); border-radius: var(--r);
    background: var(--sur2); font-size: 13px; font-family: inherit;
    color: var(--tx); outline: none;
    transition: border-color 0.15s;
  }
  .desk-search-inp:focus { border-color: var(--blue); background: var(--sur); }

  .desk-content { padding: 24px 26px 60px; }
  .desk-stat-strip { grid-template-columns: repeat(4,1fr); }

  .tabbar { display: none; }
  .pages { overflow: visible; }
  .page { padding: 0; }

  /* desktop modal: centered overlay instead of sheet */
  .sheet-bg { display: none; }
  .sheet-bg.open { display: block; }
  .sheet {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    bottom: auto; right: auto;
    width: min(680px, 95vw);
    max-height: 85vh;
    border-radius: var(--rxl);
    padding-bottom: 0;
    transition: none;
    display: none;
  }
  .sheet.open { display: flex; }
  .sheet-handle { display: none; }
}

@media (min-width: 768px) {
  .mobile-only { display: none !important; }
}

const DISC_CATS = [

let discLogs={}, attLogs={};
function load(){try{discLogs=JSON.parse(localStorage.getItem('disc_v2')||'{}')}catch(e){discLogs={}}try{attLogs=JSON.parse(localStorage.getItem('att_v2')||'{}')}catch(e){attLogs={}}}
function save(){localStorage.setItem('disc_v2',JSON.stringify(discLogs));localStorage.setItem('att_v2',JSON.stringify(attLogs))}
const sid=(b,n)=>`${b}-${n}`;
const today=()=>new Date().toISOString().split('T')[0];

let curBan=1, curPage='record', modalSid=null, modalTab='discipline', editDisc=null, editAtt=null;

load();
buildNav();
setBan(1);

function buildNav(){
  // mobile chips
  const chips = document.getElementById('ban-chips');
  if(chips) chips.innerHTML = BANS.map(b=>{
    const tot=STUDENTS_RAW.filter(r=>r[0]===b).reduce((s,r)=>(discLogs[sid(b,r[1])]||[]).length+(attLogs[sid(b,r[1])]||[]).length+s,0);
    return `<button class="ban-chip${b===curBan?' active':''}" id="chip-${b}" onclick="setBan(${b})">
      ${b}반${tot?`<span class="ban-chip-cnt">${tot}</span>`:''}
    </button>`;
  }).join('');
  // desktop sidebar
  const sdList = document.getElementById('sd-ban-list');
  if(sdList) sdList.innerHTML = BANS.map(b=>{
    const tot=STUDENTS_RAW.filter(r=>r[0]===b).reduce((s,r)=>(discLogs[sid(b,r[1])]||[]).length+(attLogs[sid(b,r[1])]||[]).length+s,0);

      <span class="sd-dot">${b}</span>${b}반
      ${tot?`<span class="sd-cnt">${tot}</span>`:''}
    </button>`;
  }).join('');
}

function setBan(b){
  curBan=b;
  document.querySelectorAll('.ban-chip').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.sd-ban-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById(`chip-${b}`)?.classList.add('active');
  document.getElementById(`sd-ban-${b}`)?.classList.add('active');
  const di=document.getElementById(`desk-search-inp`);
  if(di) di.value='';
  renderPage();
}

function setPage(p){
  curPage=p;
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById(`page-${p}`).classList.add('active');
  // mobile tabs
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById(`tab-${p}`)?.classList.add('active');
  // desktop sidebar nav
  document.querySelectorAll('.sd-nav-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById(`sd-nav-${p}`)?.classList.add('active');
  if(p==='stats') renderStats();
}

function renderPage(){
  const studs=STUDENTS_RAW.filter(r=>r[0]===curBan);
  const tt=`${curBan}반`, ts=`${studs.length}명`;
  const dt=document.getElementById('desk-page-title');
  const ds=document.getElementById('desk-page-sub');
  if(dt) dt.textContent=tt; if(ds) ds.textContent=ts;

  const tD=studs.reduce((s,r)=>(discLogs[sid(curBan,r[1])]||[]).length+s,0);
  const tA=studs.reduce((s,r)=>(attLogs[sid(curBan,r[1])]||[]).length+s,0);
  const fD=studs.filter(r=>(discLogs[sid(curBan,r[1])]||[]).length>0).length;
  const fA=studs.filter(r=>(attLogs[sid(curBan,r[1])]||[]).length>0).length;

  document.getElementById('stat-strip').innerHTML=`
    <div class="scard"><div class="scard-lbl">재적</div><div class="scard-val">${studs.length}</div><div class="scard-unit">명</div></div>
    <div class="scard${tD>0?' hi':''}"><div class="scard-lbl">생활지도</div><div class="scard-val">${tD}</div><div class="scard-unit">건 · ${fD}명</div></div>
    <div class="scard${tA>0?' hi':''}"><div class="scard-lbl">근태</div><div class="scard-val">${tA}</div><div class="scard-unit">건 · ${fA}명</div></div>
    <div class="scard"><div class="scard-lbl">이상 없음</div><div class="scard-val">${studs.length-Math.max(fD,fA)}</div><div class="scard-unit">명</div></div>
  `;
  renderStudents();
}

function renderStudents(){
  const di=document.getElementById('desk-search-inp');
  const q=(di?di.value:'').trim();
  const list=q?STUDENTS_RAW.filter(r=>r[2].includes(q)):STUDENTS_RAW.filter(r=>r[0]===curBan);
  const grid=document.getElementById('stu-grid');
  if(!list.length){grid.innerHTML='<div style="grid-column:1/-1;padding:48px;text-align:center;color:var(--tx3);font-size:13px">검색 결과 없음</div>';return;}
  grid.innerHTML=list.map(r=>{
    const s=sid(r[0],r[1]),dl=discLogs[s]||[],al=attLogs[s]||[];
    const hasD=dl.length>0,hasA=al.length>0;
    const cls=hasD&&hasA?'f-both':hasD?'f-disc':hasA?'f-att':'';
    const dC={},aC={};
    dl.forEach(l=>dC[l.cat]=(dC[l.cat]||0)+1);
    al.forEach(l=>aC[l.cat]=(aC[l.cat]||0)+1);
    const dT=Object.entries(dC).map(([k,n])=>{const d=DISC_CATS.find(c=>c.key===k)||{color:'#555',bg:'#eee'};return`<span class="mini-tag" style="background:${d.bg};color:${d.color}">${sD(k)} ${n}</span>`;}).join('');
    const aT=Object.entries(aC).map(([k,n])=>{const d=ATT_CATS.find(c=>c.key===k)||{color:'#555',bg:'#eee'};return`<span class="mini-tag" style="background:${d.bg};color:${d.color}">${sA(k)} ${n}</span>`;}).join('');
    const pfx=q?`<span style="font-size:10px;color:var(--tx3)">${r[0]}반 ${r[1]}번</span>`:`<div class="stu-num">${r[1]}번</div>`;
    return`<div class="stu-card ${cls}" onclick="openSheet(${r[0]},${r[1]},'${r[2]}')">${pfx}<div class="stu-name">${r[2]}</div>${dT||aT?`<div class="stu-tags">${dT}${aT}</div>`:''}</div>`;
  }).join('');
}

const sD=k=>({교사지시불이행:'지시',스마트기기:'기기',수업태도:'태도',언어폭력:'언어',폭력:'폭력',기타:'기타'}[k]||k);
const sA=k=>({미인정지각:'지각',미인정조퇴:'조퇴',미인정결과:'결과',미인정결석:'결석'}[k]||k);

    const s=sid(r[0],r[1]),dl=discLogs[s]||[],al=attLogs[s]||[];
    const dC={},aC={};
    dl.forEach(l=>dC[l.cat]=(dC[l.cat]||0)+1);
    al.forEach(l=>aC[l.cat]=(aC[l.cat]||0)+1);
    const dT=Object.entries(dC).map(([k,n])=>{const d=DISC_CATS.find(c=>c.key===k)||{color:'#555',bg:'#eee'};return`<span class="sr-tag" style="background:${d.bg};color:${d.color}">${sD(k)} ${n}</span>`;}).join('');
    const aT=Object.entries(aC).map(([k,n])=>{const d=ATT_CATS.find(c=>c.key===k)||{color:'#555',bg:'#eee'};return`<span class="sr-tag" style="background:${d.bg};color:${d.color}">${sA(k)} ${n}</span>`;}).join('');
    return`<div class="search-result-item" onclick="searchOpen(${r[0]},${r[1]},'${r[2]}')">
      <div class="sr-avatar">${r[2][0]}</div>
      <div style="flex:1;min-width:0">
        <div class="sr-name">${r[2]}</div>
        <div class="sr-info">2학년 ${r[0]}반 ${r[1]}번</div>
        ${dT||aT?`<div class="sr-tags">${dT}${aT}</div>`:''}
      </div>
    </div>`;
  }).join('');
}
function searchOpen(ban,num,name){
  document.getElementById('search-overlay').classList.remove('open');
  setTimeout(()=>openSheet(ban,num,name),150);
}

// ── SHEET ──
function openSheet(ban,num,name){
  modalSid=sid(ban,num);modalTab='discipline';editDisc=null;editAtt=null;
  document.getElementById('sh-avatar').textContent=name[0];
  document.getElementById('sh-name').textContent=name;
  document.getElementById('sh-sub').textContent=`2학년 ${ban}반 ${num}번`;
  document.getElementById('stab-disc').classList.add('active');
  document.getElementById('stab-att').classList.remove('active');
  renderSheetBody();
  document.getElementById('sheet-bg').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSheet(){
  document.getElementById('sheet-bg').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow='';
  modalSid=null;
}
function closeBg(e){if(e.target===document.getElementById('sheet-bg'))closeSheet();}
function switchTab(t){
  modalTab=t;editDisc=null;editAtt=null;
  document.getElementById('stab-disc').classList.toggle('active',t==='discipline');
  document.getElementById('stab-att').classList.toggle('active',t==='attendance');
  renderSheetBody();
}
function renderSheetBody(){
  document.getElementById('sheet-body').innerHTML=
    modalTab==='discipline'?buildDiscBody():buildAttBody();
}

function buildDiscBody(){
  const logs=(discLogs[modalSid]||[]).slice().reverse();
  const lH=logs.length?logs.map((l,ri)=>{
    const idx=(discLogs[modalSid]||[]).length-1-ri;
    const d=DISC_CATS.find(c=>c.key===l.cat)||{label:l.cat,color:'#555',bg:'#eee'};
    return`<div class="log-item" id="di-${idx}">
      <div class="log-top"><span class="log-date">${l.date}</span><span class="log-badge" style="background:${d.bg};color:${d.color}">${d.label}</span></div>
      <div class="log-text">${esc(l.content)}</div>
      <div class="log-acts" id="da-${idx}">
        <button class="btn-xs" onclick="editDiscStart(${idx})">✏ 수정</button>
        <button class="btn-xs del" onclick="discDel(${idx})">🗑 삭제</button>
      </div>
    </div>`;
  }).join(''):`<div class="empty"><div class="empty-icon">📋</div>생활지도 기록이 없습니다</div>`;
  return`<div class="log-list">${lH}</div>
    <div class="form-sep"></div>
    <div class="form-head" id="disc-fh">새 기록 추가</div>
    <div class="form-2col">
      <div><label class="form-lbl">날짜</label><input type="date" id="fd-date" value="${today()}"></div>
      <div><label class="form-lbl">위반 유형</label><select id="fd-cat">${DISC_CATS.map(c=>`<option value="${c.key}">${c.label}</option>`).join('')}</select></div>
    </div>
    <div class="form-row"><label class="form-lbl">상황 기록</label><textarea id="fd-content" placeholder="상황을 구체적으로 기록하세요..."></textarea></div>
    <div class="form-btns">
      <button class="btn-primary" onclick="saveDisc()">저장</button>
      <button class="btn-ghost" id="disc-cancel" style="display:none" onclick="cancelDisc()">취소</button>
    </div>`;
}

function buildAttBody(){
  const logs=(attLogs[modalSid]||[]).slice().reverse();
  const cnts={};(attLogs[modalSid]||[]).forEach(l=>cnts[l.cat]=(cnts[l.cat]||0)+1);
  const pills=ATT_CATS.filter(c=>cnts[c.key]).map(c=>`<span class="att-pill" style="background:${c.bg};color:${c.color};border-color:${c.border}">${c.label} <strong>${cnts[c.key]}회</strong></span>`).join('');
  const lH=logs.length?logs.map((l,ri)=>{
    const idx=(attLogs[modalSid]||[]).length-1-ri;
    const d=ATT_CATS.find(c=>c.key===l.cat)||{label:l.cat,color:'#555',bg:'#eee'};
    return`<div class="log-item" id="ai-${idx}">
      <div class="log-top"><span class="log-date">${l.date}</span><span class="log-badge" style="background:${d.bg};color:${d.color}">${d.label}</span></div>
      <div class="log-text">${esc(l.content||'(사유 없음)')}</div>
      <div class="log-acts" id="aa-${idx}">
        <button class="btn-xs" onclick="editAttStart(${idx})">✏ 수정</button>
        <button class="btn-xs del" onclick="attDel(${idx})">🗑 삭제</button>
      </div>
    </div>`;
  }).join(''):`<div class="empty"><div class="empty-icon">📅</div>근태 기록이 없습니다</div>`;
  return`${pills?`<div class="att-pills">${pills}</div>`:''}
    <div class="log-list">${lH}</div>
    <div class="form-sep"></div>
    <div class="form-head" id="att-fh">근태 기록 추가</div>
    <div class="form-2col">
      <div><label class="form-lbl">날짜</label><input type="date" id="fa-date" value="${today()}"></div>
      <div><label class="form-lbl">유형</label><select id="fa-cat">${ATT_CATS.map(c=>`<option value="${c.key}">${c.label}</option>`).join('')}</select></div>
    </div>
    <div class="form-row"><label class="form-lbl">사유 · 비고</label><textarea id="fa-content" placeholder="사유나 상황을 기록하세요..."></textarea></div>
    <div class="form-btns">
      <button class="btn-primary" onclick="saveAtt()">저장</button>
      <button class="btn-ghost" id="att-cancel" style="display:none" onclick="cancelAtt()">취소</button>
    </div>`;
}

function saveDisc(){
  const date=document.getElementById('fd-date').value;
  const cat=document.getElementById('fd-cat').value;
  const content=document.getElementById('fd-content').value.trim();
  if(!date||!content){alert('날짜와 내용을 입력하세요.');return;}
  if(!discLogs[modalSid])discLogs[modalSid]=[];
  if(editDisc!==null){discLogs[modalSid][editDisc]={date,cat,content};editDisc=null;}
  else discLogs[modalSid].push({date,cat,content});
  save();buildNav();renderPage();renderSheetBody();
}
function editDiscStart(idx){
  editDisc=idx;const l=discLogs[modalSid][idx];renderSheetBody();
  document.getElementById('fd-date').value=l.date;
  document.getElementById('fd-cat').value=l.cat;
  document.getElementById('fd-content').value=l.content;
  document.getElementById('disc-fh').textContent='기록 수정';
  document.getElementById('disc-cancel').style.display='';
}
function cancelDisc(){editDisc=null;renderSheetBody();}
function discDel(idx){
  const el=document.getElementById(`da-${idx}`);if(!el)return;
  el.innerHTML=`<span style="font-size:12px;color:var(--tx2)">정말 삭제할까요?</span>
    <button class="btn-xs del" onclick="deleteDisc(${idx})">삭제</button>
    <button class="btn-xs" onclick="renderSheetBody()">취소</button>`;
}
function deleteDisc(idx){
  discLogs[modalSid].splice(idx,1);
  if(!discLogs[modalSid].length)delete discLogs[modalSid];
  save();buildNav();renderPage();renderSheetBody();
}

function saveAtt(){
  const date=document.getElementById('fa-date').value;
  const cat=document.getElementById('fa-cat').value;
  const content=document.getElementById('fa-content').value.trim();
  if(!date){alert('날짜를 선택하세요.');return;}
  if(!attLogs[modalSid])attLogs[modalSid]=[];
  if(editAtt!==null){attLogs[modalSid][editAtt]={date,cat,content};editAtt=null;}
  else attLogs[modalSid].push({date,cat,content});
  save();buildNav();renderPage();renderSheetBody();
}
function editAttStart(idx){
  editAtt=idx;const l=attLogs[modalSid][idx];renderSheetBody();
  document.getElementById('fa-date').value=l.date;
  document.getElementById('fa-cat').value=l.cat;
  document.getElementById('fa-content').value=l.content||'';
  document.getElementById('att-fh').textContent='기록 수정';
  document.getElementById('att-cancel').style.display='';
}
function cancelAtt(){editAtt=null;renderSheetBody();}
function attDel(idx){
  const el=document.getElementById(`aa-${idx}`);if(!el)return;
  el.innerHTML=`<span style="font-size:12px;color:var(--tx2)">정말 삭제할까요?</span>
    <button class="btn-xs del" onclick="deleteAtt(${idx})">삭제</button>
    <button class="btn-xs" onclick="renderSheetBody()">취소</button>`;
}
function deleteAtt(idx){
  attLogs[modalSid].splice(idx,1);
  if(!attLogs[modalSid].length)delete attLogs[modalSid];
  save();buildNav();renderPage();renderSheetBody();
}

function renderStats(){
  const aD=Object.values(discLogs).flat(),aA=Object.values(attLogs).flat();
  const tD=aD.length,tA=aA.length;
  const sD2=Object.values(discLogs).filter(l=>l.length>0).length;
  const sA2=Object.values(attLogs).filter(l=>l.length>0).length;
  const dCat={};aD.forEach(l=>dCat[l.cat]=(dCat[l.cat]||0)+1);
  const aCat={};aA.forEach(l=>aCat[l.cat]=(aCat[l.cat]||0)+1);
  const maxD=Math.max(...Object.values(dCat),1);
  const maxA=Math.max(...Object.values(aCat),1);
  const aStu={};ATT_CATS.forEach(c=>{aStu[c.key]=STUDENTS_RAW.filter(r=>(attLogs[sid(r[0],r[1])]||[]).some(l=>l.cat===c.key)).length;});
  const aBan={};BANS.forEach(b=>{aBan[b]={};ATT_CATS.forEach(c=>aBan[b][c.key]=0);STUDENTS_RAW.filter(r=>r[0]===b).forEach(r=>{(attLogs[sid(b,r[1])]||[]).forEach(l=>{if(aBan[b][l.cat]!==undefined)aBan[b][l.cat]++;});});});
  const aTB={};BANS.forEach(b=>aTB[b]=ATT_CATS.reduce((s,c)=>s+aBan[b][c.key],0));
  const dBan={};BANS.forEach(b=>dBan[b]=STUDENTS_RAW.filter(r=>r[0]===b).reduce((s,r)=>(discLogs[sid(b,r[1])]||[]).length+s,0));
  const maxBD=Math.max(...Object.values(dBan),1);
  const rank=STUDENTS_RAW.map(r=>{const s=sid(r[0],r[1]),ad={};ATT_CATS.forEach(c=>ad[c.key]=0);(attLogs[s]||[]).forEach(l=>{if(ad[l.cat]!==undefined)ad[l.cat]++;});return{name:r[2],ban:r[0],disc:(discLogs[s]||[]).length,att:(attLogs[s]||[]).length,ad,total:(discLogs[s]||[]).length+(attLogs[s]||[]).length};}).filter(s=>s.total>0).sort((a,b)=>b.total-a.total).slice(0,15);

  document.getElementById('stats-body').innerHTML=`
    <div class="stat-strip desk-stat-strip" style="margin-bottom:28px">
      <div class="scard"><div class="scard-lbl">전체 생활지도</div><div class="scard-val">${tD}</div><div class="scard-unit">건 · ${sD2}명</div></div>
      <div class="scard"><div class="scard-lbl">전체 근태</div><div class="scard-val">${tA}</div><div class="scard-unit">건 · ${sA2}명</div></div>
      <div class="scard"><div class="scard-lbl">전체 학생</div><div class="scard-val">${STUDENTS_RAW.length}</div><div class="scard-unit">명</div></div>
      <div class="scard"><div class="scard-lbl">전체 반</div><div class="scard-val">${BANS.length}</div><div class="scard-unit">개</div></div>
    </div>

    <div class="stats-sec">
      <div class="stats-title">근태 유형별 현황</div>
      <div class="att-cards">
        ${ATT_CATS.map(c=>`<div class="att-card" style="background:${c.bg};border-color:${c.border}">
          <div class="ac-tag" style="color:${c.color}">${c.label}</div>
          <div class="ac-num" style="color:${c.color}">${aCat[c.key]||0}</div>
          <div class="ac-sub" style="color:${c.color}">건 · ${aStu[c.key]}명</div>
        </div>`).join('')}
      </div>
      <div class="chart-row">
        ${ATT_CATS.map(c=>`<div class="chart-item">
          <div class="chart-lbl">${c.label}</div>
          <div class="chart-track"><div class="chart-fill" style="width:${Math.round(((aCat[c.key]||0)/maxA)*100)}%;background:${c.color}"></div></div>
          <div class="chart-n">${aCat[c.key]||0}</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="stats-sec">
      <div class="stats-title">반별 근태 유형별 현황</div>
      <div class="rtable-wrap">
        <table class="rtable">
          <thead><tr><th>반</th>${ATT_CATS.map(c=>`<th style="text-align:center"><span style="background:${c.bg};color:${c.color};padding:2px 6px;border-radius:4px;font-size:9px;white-space:nowrap">${c.label}</span></th>`).join('')}<th style="text-align:center">합계</th></tr></thead>
          <tbody>
            ${BANS.map(b=>`<tr><td style="font-weight:700">${b}반</td>${ATT_CATS.map(c=>`<td style="text-align:center">${aBan[b][c.key]>0?`<span style="background:${c.bg};color:${c.color};padding:2px 8px;border-radius:5px;font-size:12px;font-weight:700">${aBan[b][c.key]}</span>`:`<span style="color:var(--tx3)">-</span>`}</td>`).join('')}<td style="text-align:center;font-weight:700">${aTB[b]||0}</td></tr>`).join('')}
            <tr style="background:var(--sur2)"><td style="font-weight:700;color:var(--tx3);font-size:10px">합계</td>${ATT_CATS.map(c=>`<td style="text-align:center;font-weight:700">${aCat[c.key]||0}</td>`).join('')}<td style="text-align:center;font-weight:700">${tA}</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="stats-sec">
      <div class="stats-title">생활지도 위반 유형별</div>
      <div class="chart-row">
        ${DISC_CATS.map(c=>`<div class="chart-item">
          <div class="chart-lbl">${c.label}</div>
          <div class="chart-track"><div class="chart-fill" style="width:${Math.round(((dCat[c.key]||0)/maxD)*100)}%;background:${c.color}"></div></div>
          <div class="chart-n">${dCat[c.key]||0}</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="stats-sec">
      <div class="stats-title">반별 생활지도 현황</div>
      <div class="chart-row">
        ${BANS.map(b=>`<div class="chart-item">
          <div class="chart-lbl">${b}반</div>
          <div class="chart-track"><div class="chart-fill" style="width:${Math.round(((dBan[b]||0)/maxBD)*100)}%;background:var(--blue)"></div></div>
          <div class="chart-n">${dBan[b]||0}</div>
        </div>`).join('')}
      </div>
    </div>

    ${rank.length?`<div class="stats-sec">
      <div class="stats-title">누적 기록 상위 학생</div>
      <div class="rtable-wrap">
        <table class="rtable">
          <thead><tr><th>#</th><th>이름</th><th>반</th><th style="text-align:center">지도</th>${ATT_CATS.map(c=>`<th style="text-align:center;font-size:9px">${c.label.replace('미인정 ','')}</th>`).join('')}<th style="text-align:center">합계</th></tr></thead>
          <tbody>${rank.map((s,i)=>`<tr><td style="color:var(--tx3)">${i+1}</td><td style="font-weight:700">${s.name}</td><td>${s.ban}반</td><td style="text-align:center">${s.disc>0?`<span style="background:#FDF0EA;color:#7C3A1E;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700">${s.disc}</span>`:'-'}</td>${ATT_CATS.map(c=>`<td style="text-align:center">${s.ad[c.key]>0?`<span style="background:${c.bg};color:${c.color};padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700">${s.ad[c.key]}</span>`:'-'}</td>`).join('')}<td style="text-align:center;font-weight:700">${s.total}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`:`<div class="empty" style="padding:48px"><div class="empty-icon">📊</div>아직 기록이 없습니다</div>`}
  `;
}

const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
</script>
</body>
</html>
